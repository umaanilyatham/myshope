<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(to right,#1d2671,#c33764);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:850px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#1d2671;
        }

        form{
            display:grid;
            grid-template-columns:1fr 1fr 1fr auto;
            gap:15px;
            margin-bottom:30px;
        }

        input{
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            outline:none;
        }

        input:focus{
            border-color:#1d2671;
        }

        button{
            background:#1d2671;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
            font-size:16px;
        }

        button:hover{
            background:#c33764;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:10px;
        }

        thead{
            background:#1d2671;
            color:white;
        }

        th,td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .empty{
            color:gray;
            padding:20px;
        }

        @media(max-width:768px){

            form{
                grid-template-columns:1fr;
            }

            .container{
                width:100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Things Management</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="name" placeholder="Enter Name">

        <input type="number" name="price" placeholder="Enter Price">

        <input type="number" name="quanity" placeholder="Enter Quantity">

        <button type="submit">Save</button>

    </form>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody>

        {% for thing in Things %}

        <tr>
            <td>{{ thing.name }}</td>
            <td>₹ {{ thing.price }}</td>
            <td>{{ thing.quanity }}</td>
        </tr>

        {% empty %}

        <tr>
            <td colspan="3" class="empty">
                No Data Available
            </td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
